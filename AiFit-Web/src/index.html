<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AIFit App</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238B5CF6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'/></svg>">
  <script>
    window.addEventListener('error', function(e) {
      var div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;overflow:auto;max-height:100vh;';
      div.innerHTML = '<h2>Global Error</h2>' + (e.error ? e.error.message + '\n\n' + e.error.stack : e.message);
      document.body.appendChild(div);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;overflow:auto;max-height:100vh;';
      div.innerHTML = '<h2>Promise Rejection</h2>' + (e.reason ? (e.reason.message + '\n\n' + e.reason.stack) : JSON.stringify(e.reason));
      document.body.appendChild(div);
    });
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
